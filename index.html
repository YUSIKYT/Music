<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя музыка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .layout {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Рекламная колонка слева */
        .ad-sidebar {
            width: 200px;
            flex-shrink: 0;
        }

        .ad-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 20px;
        }

        .ad-banner {
            width: 160px;
            height: 600px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ffd93d 100%);
            border-radius: 10px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
            overflow: hidden;
        }

        .ad-banner::before {
            content: '⭐';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            opacity: 0.5;
        }

        .ad-banner:hover {
            transform: scale(1.02);
        }

        .ad-banner.small {
            height: 200px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .ad-banner.medium {
            height: 300px;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .ad-text {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .ad-subtext {
            font-size: 14px;
            opacity: 0.9;
        }

        .ad-label {
            position: absolute;
            bottom: 5px;
            left: 5px;
            font-size: 10px;
            opacity: 0.5;
        }

        /* Основной контент */
        .container {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4a00e0 0%, #8e2de2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .music-list {
            padding: 30px;
        }

        .song-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s;
        }

        .song-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .song-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .song-number {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }

        .song-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            word-break: break-word;
        }

        audio {
            width: 100%;
            border-radius: 30px;
        }

        .no-music {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .no-music .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .no-music h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #333;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            border-top: 1px solid #eee;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.3s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }

        /* Адаптация для мобильных */
        @media (max-width: 768px) {
            .layout {
                flex-direction: column;
            }
            
            .ad-sidebar {
                width: 100%;
                order: -1;
            }
            
            .ad-banner {
                width: 100%;
                height: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <!-- Левая колонка с рекламой -->
        <div class="ad-sidebar">
            <div class="ad-container">
                <!-- Блок рекламы 1 (большой) -->
                <div class="ad-banner" onclick="window.open('https://example.com/ad1', '_blank')">
                    <div class="ad-text">🎧</div>
                    <div class="ad-text">Premium</div>
                    <div class="ad-subtext">Качественный звук</div>
                    <div class="ad-subtext">без ограничений</div>
                    <div class="ad-label">Реклама</div>
                </div>
            </div>

            <div class="ad-container">
                <!-- Блок рекламы 2 (средний) -->
                <div class="ad-banner medium" onclick="window.open('https://example.com/ad2', '_blank')">
                    <div class="ad-text">🎸</div>
                    <div class="ad-text">Курсы</div>
                    <div class="ad-subtext">гитары</div>
                    <div class="ad-subtext">-50%</div>
                    <div class="ad-label">Реклама</div>
                </div>
            </div>

            <div class="ad-container">
                <!-- Блок рекламы 3 (маленький) -->
                <div class="ad-banner small" onclick="window.open('https://example.com/ad3', '_blank')">
                    <div class="ad-text">🎤</div>
                    <div class="ad-text">Караоке</div>
                    <div class="ad-subtext">по подписке</div>
                    <div class="ad-label">Реклама</div>
                </div>
            </div>
        </div>

        <!-- Основной контент с музыкой -->
        <div class="container">
            <div class="header">
                <h1>🎵 Моя музыка</h1>
                <p>Все треки из папки music</p>
            </div>

            <div class="music-list" id="musicList">
                <div class="no-music">
                    <div class="emoji">⏳</div>
                    <h3>Загрузка музыки...</h3>
                </div>
            </div>

            <div class="footer">
                <p>📁 Добавьте файлы в папку <strong>music</strong> на GitHub</p>
                <p>Сайт обновляется автоматически</p>
            </div>
        </div>
    </div>

    <script>
        async function loadMusic() {
            const musicList = document.getElementById('musicList');
            
            try {
                const response = await fetch('https://api.github.com/repos/YUSIKYT/Music/contents/music');
                
                if (!response.ok) {
                    const response2 = await fetch('https://api.github.com/repos/YUSIKYT/Music/contents/Music');
                    
                    if (!response2.ok) {
                        throw new Error('Папка music не найдена. Создайте папку "music" в корне репозитория Music');
                    }
                    
                    const files = await response2.json();
                    displaySongs(files);
                    return;
                }

                const files = await response.json();
                displaySongs(files);

            } catch (error) {
                console.error('Ошибка:', error);
                
                musicList.innerHTML = `
                    <div class="no-music">
                        <div class="emoji">❌</div>
                        <h3>Ошибка загрузки музыки</h3>
                        <p style="color: #ff4444; margin-bottom: 20px;">${error.message}</p>
                        
                        <div style="background: #f0f0f0; border-radius: 12px; padding: 20px; text-align: left; margin: 20px 0;">
                            <p style="font-weight: bold; margin-bottom: 10px;">📋 Проверьте:</p>
                            <ul style="list-style: none;">
                                <li style="margin-bottom: 8px;">✓ Репозиторий: <strong>YUSIKYT/Music</strong></li>
                                <li style="margin-bottom: 8px;">✓ Папка должна называться <strong>music</strong> или <strong>Music</strong></li>
                                <li style="margin-bottom: 8px;">✓ В папке должны быть аудиофайлы (.mp3, .wav, .ogg)</li>
                                <li style="margin-bottom: 8px;">✓ После загрузки подождите 1-2 минуты</li>
                            </ul>
                        </div>
                        
                        <button class="refresh-btn" onclick="loadMusic()">
                            🔄 Попробовать снова
                        </button>
                    </div>
                `;
            }
        }

        function displaySongs(files) {
            const musicList = document.getElementById('musicList');
            
            if (!Array.isArray(files) || files.length === 0) {
                musicList.innerHTML = `
                    <div class="no-music">
                        <div class="emoji">📁</div>
                        <h3>Папка music пуста</h3>
                        <p>Добавьте аудиофайлы в папку music на GitHub</p>
                        <button class="refresh-btn" onclick="loadMusic()">🔄 Обновить</button>
                    </div>
                `;
                return;
            }

            const audioFiles = files.filter(file => {
                if (file.type !== 'file') return false;
                const ext = file.name.split('.').pop().toLowerCase();
                return ['mp3', 'wav', 'ogg', 'm4a', 'aac', 'flac', 'webm'].includes(ext);
            });

            if (audioFiles.length === 0) {
                musicList.innerHTML = `
                    <div class="no-music">
                        <div class="emoji">🎵</div>
                        <h3>Нет аудиофайлов</h3>
                        <p>В папке music найдены файлы, но нет поддерживаемых аудиоформатов</p>
                        <p>Поддерживаемые форматы: MP3, WAV, OGG, M4A, AAC, FLAC</p>
                        <button class="refresh-btn" onclick="loadMusic()">🔄 Обновить</button>
                    </div>
                `;
                return;
            }

            let songsHTML = '';
            
            audioFiles.forEach((file, index) => {
                const songName = file.name.replace(/\.[^/.]+$/, "");
                const sizeInMB = (file.size / 1024 / 1024).toFixed(2);
                
                songsHTML += `
                    <div class="song-item">
                        <div class="song-info">
                            <span class="song-number">${index + 1}</span>
                            <span class="song-name">${songName}</span>
                        </div>
                        <audio controls preload="metadata">
                            <source src="${file.download_url}" type="audio/mpeg">
                            Ваш браузер не поддерживает аудио элемент.
                        </audio>
                        <div style="font-size: 0.8em; color: #999; margin-top: 5px; text-align: right;">
                            ${sizeInMB} MB
                        </div>
                    </div>
                `;
            });

            musicList.innerHTML = songsHTML;
        }

        window.addEventListener('DOMContentLoaded', loadMusic);
    </script>
</body>
</html>
