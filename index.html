<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя музыка</title>
    <style>
        /* Стили такие же как в твоём коде, я их сохранил */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1A1A1A;
            color: #fff;
            min-height: 100vh;
        }

        .sidebar {
            width: 240px;
            background: #000;
            padding: 24px 16px;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            margin-bottom: 32px;
            color: #FC0;
            font-size: 24px;
            font-weight: 700;
        }

        .logo span {
            font-size: 32px;
            margin-right: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: #B3B3B3;
            cursor: pointer;
            border-radius: 8px;
            margin-bottom: 4px;
            transition: all 0.2s;
        }

        .nav-item:hover, .nav-item.active {
            background: #2A2A2A;
            color: #fff;
        }

        .nav-item.active .nav-icon {
            color: #FC0;
        }

        .nav-icon {
            margin-right: 12px;
            font-size: 20px;
            width: 24px;
        }

        .playlist-title {
            color: #B3B3B3;
            font-size: 12px;
            padding: 8px 16px;
            margin-top: 24px;
        }

        .main-content {
            margin-left: 240px;
            padding-bottom: 100px;
        }

        .header {
            padding: 20px 32px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #2A2A2A;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            color: #FC0;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .stats {
            color: #B3B3B3;
            font-size: 14px;
        }

        .stats span {
            color: #FC0;
            font-weight: 600;
            margin: 0 4px;
        }

        .user {
            width: 40px;
            height: 40px;
            background: #FC0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-weight: 600;
            cursor: pointer;
        }

        .content {
            padding: 32px;
        }

        .welcome {
            margin-bottom: 32px;
        }

        .welcome h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .welcome p {
            color: #B3B3B3;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
            margin: 32px 0;
        }

        .card {
            background: #2A2A2A;
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .card:hover {
            background: #333;
            transform: translateY(-4px);
        }

        .card-image {
            width: 100%;
            aspect-ratio: 1;
            background: linear-gradient(135deg, #4A4A4A, #2A2A2A);
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #FC0;
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-artist {
            color: #B3B3B3;
            font-size: 14px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 32px 0 16px;
            font-size: 24px;
            font-weight: 700;
        }

        .section-title button {
            background: none;
            border: none;
            color: #B3B3B3;
            cursor: pointer;
            font-size: 14px;
        }

        .section-title button:hover {
            color: #FC0;
        }

        .track-list {
            background: #2A2A2A;
            border-radius: 12px;
            overflow: hidden;
        }

        .track-header {
            display: flex;
            padding: 12px 16px;
            color: #B3B3B3;
            font-size: 14px;
            border-bottom: 1px solid #3A3A3A;
        }

        .track-number { width: 50px; }
        .track-title { flex: 1; }
        .track-album { width: 200px; }
        .track-duration { width: 80px; }

        .track-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #3A3A3A;
            cursor: pointer;
            transition: background 0.2s;
        }

        .track-item:hover {
            background: #333;
        }

        .track-item.playing {
            background: rgba(255, 204, 0, 0.1);
            border-left: 3px solid #FC0;
        }

        .track-number {
            width: 50px;
            color: #B3B3B3;
        }

        .track-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .track-image {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4A4A4A, #2A2A2A);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FC0;
        }

        .track-name {
            font-weight: 500;
            margin-bottom: 4px;
        }

        .track-artist {
            font-size: 12px;
            color: #B3B3B3;
        }

        .track-album {
            width: 200px;
            color: #B3B3B3;
            font-size: 14px;
        }

        .track-duration {
            width: 80px;
            color: #B3B3B3;
        }

        .track-favorite {
            width: 40px;
            font-size: 20px;
            cursor: pointer;
            color: #B3B3B3;
        }

        .track-favorite.active {
            color: #FC0;
        }

        .track-queue {
            width: 40px;
            font-size: 20px;
            cursor: pointer;
            color: #B3B3B3;
        }

        .track-queue:hover {
            color: #FC0;
        }

        .player-bar {
            position: fixed;
            bottom: 0;
            left: 240px;
            right: 0;
            background: #000;
            border-top: 1px solid #2A2A2A;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 24px;
            z-index: 100;
            height: 90px;
        }

        .player-track {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 300px;
        }

        .player-image {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #4A4A4A, #2A2A2A);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #FC0;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .player-artist {
            font-size: 12px;
            color: #B3B3B3;
        }

        .player-controls {
            flex: 1;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .control-buttons {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .control-btn {
            background: none;
            border: none;
            color: #B3B3B3;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            color: #FC0;
            transform: scale(1.1);
        }

        .control-btn.active {
            color: #FC0;
        }

        .control-btn.play-pause {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #FC0;
            color: #000;
            font-size: 24px;
        }

        .control-btn.play-pause:hover {
            background: #FFA500;
        }

        .bass-btn {
            background: none;
            border: none;
            color: #B3B3B3;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bass-btn:hover,
        .bass-btn.active {
            color: #FC0;
        }

        .bass-panel {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 1px solid #2A2A2A;
            border-radius: 30px;
            padding: 15px 25px;
            display: none;
            align-items: center;
            gap: 20px;
            z-index: 200;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .bass-panel.open {
            display: flex;
        }

        .bass-panel span {
            color: #FC0;
            font-size: 16px;
            min-width: 70px;
        }

        .bass-panel input {
            width: 250px;
            height: 6px;
            -webkit-appearance: none;
            background: #2A2A2A;
            border-radius: 3px;
            outline: none;
        }

        .bass-panel input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #FC0;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,204,0,0.5);
        }

        .bass-value {
            color: #FC0 !important;
            font-weight: bold;
        }

        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .progress-time {
            font-size: 12px;
            color: #B3B3B3;
            min-width: 40px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: #2A2A2A;
            border-radius: 2px;
            cursor: pointer;
        }

        .progress {
            height: 100%;
            background: #FC0;
            border-radius: 2px;
            width: 0%;
        }

        .player-volume {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 200px;
        }

        .volume-icon {
            color: #B3B3B3;
            font-size: 20px;
            cursor: pointer;
        }

        .volume-bar {
            flex: 1;
            height: 4px;
            background: #2A2A2A;
            border-radius: 2px;
            cursor: pointer;
        }

        .volume-progress {
            height: 100%;
            background: #FC0;
            border-radius: 2px;
            width: 70%;
        }

        .speed-btn {
            background: #2A2A2A;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            cursor: pointer;
            color: #B3B3B3;
        }

        .speed-btn:hover {
            background: #FC0;
            color: #000;
        }

        .queue-panel {
            position: fixed;
            right: 20px;
            bottom: 100px;
            width: 300px;
            background: #000;
            border: 1px solid #2A2A2A;
            border-radius: 12px;
            padding: 16px;
            display: none;
            z-index: 200;
        }

        .queue-panel.open {
            display: block;
        }

        .queue-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #2A2A2A;
        }

        .queue-item {
            display: flex;
            align-items: center;
            padding: 8px;
            background: #2A2A2A;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .queue-item.playing {
            border-left: 3px solid #FC0;
        }

        .queue-item-info {
            flex: 1;
            margin-left: 12px;
        }

        .queue-item-name {
            font-size: 14px;
        }

        .queue-remove {
            cursor: pointer;
            color: #B3B3B3;
            padding: 0 8px;
        }

        .queue-remove:hover {
            color: #ff4444;
        }

        .queue-toggle {
            position: fixed;
            right: 20px;
            bottom: 200px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #FC0;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 24px;
            z-index: 150;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #000;
            border-left: 4px solid #FC0;
            padding: 16px;
            border-radius: 8px;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 300;
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .notification-message {
            font-size: 14px;
            color: #B3B3B3;
        }

        .profile-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: #000;
            border: 2px solid #FC0;
            border-radius: 20px;
            padding: 30px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            min-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }

        .profile-modal.open {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FC0, #FFA500);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: #000;
            font-weight: bold;
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            color: #FC0;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #2A2A2A;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #FC0;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 14px;
            color: #B3B3B3;
        }

        .profile-favorites {
            background: #2A2A2A;
            border-radius: 12px;
            padding: 20px;
            max-height: 200px;
            overflow-y: auto;
        }

        .favorites-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #FC0;
        }

        .favorite-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #3A3A3A;
        }

        .favorite-item:last-child {
            border-bottom: none;
        }

        .favorite-icon {
            margin-right: 10px;
            color: #FC0;
        }

        .favorite-name {
            flex: 1;
            font-size: 14px;
        }

        .profile-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            color: #B3B3B3;
            transition: color 0.3s;
        }

        .profile-close:hover {
            color: #FC0;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .overlay.open {
            opacity: 1;
            visibility: visible;
        }

        @media (max-width: 1024px) {
            .track-album, .track-header-album {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Боковое меню -->
    <div class="sidebar">
        <div class="logo">
            <span>🎵</span>
            Музыка
        </div>
        
        <div class="nav-item active" onclick="showPage('home', this)">
            <span class="nav-icon">🏠</span>
            Главная
        </div>
        <div class="nav-item" onclick="showPage('favorites', this)">
            <span class="nav-icon">❤️</span>
            Любимое
        </div>
        <div class="nav-item" onclick="showPage('playlists', this)">
            <span class="nav-icon">📋</span>
            Плейлисты
        </div>

        <div class="playlist-title">МОИ ПЛЕЙЛИСТЫ</div>
        <div class="nav-item" onclick="showPage('all', this)">
            <span class="nav-icon">📁</span>
            Все треки
        </div>
        <div class="nav-item" onclick="showPage('favorites', this)">
            <span class="nav-icon">⭐</span>
            Любимое
        </div>
    </div>

    <!-- Основной контент -->
    <div class="main-content">
        <!-- Шапка -->
        <div class="header">
            <div class="header-title">Моя музыка</div>
            <div class="header-right">
                <div class="stats">
                    Сегодня <span id="todayStats">0</span> мин · Всего <span id="totalStats">0</span> мин
                </div>
                <div class="user" onclick="openProfile()">Я</div>
            </div>
        </div>

        <!-- Контент -->
        <div class="content" id="content">
            <div style="text-align: center; padding: 50px; color: #B3B3B3;">
                Загрузка музыки...
            </div>
        </div>
    </div>

    <!-- Кнопка очереди -->
    <div class="queue-toggle" onclick="toggleQueue()">📋</div>

    <!-- Панель очереди -->
    <div class="queue-panel" id="queuePanel">
        <div class="queue-header">
            <div>Очередь</div>
            <div onclick="toggleQueue()" style="cursor: pointer;">✕</div>
        </div>
        <div id="queueItems"></div>
    </div>

    <!-- Уведомление -->
    <div class="notification" id="notification">
        <div class="notification-title" id="notificationTitle"></div>
        <div class="notification-message" id="notificationMessage"></div>
    </div>

    <!-- Панель баса -->
    <div class="bass-panel" id="bassPanel">
        <span>🔊 Басы</span>
        <input type="range" id="bassSlider" min="-20" max="20" value="0" step="1" oninput="updateBass()">
        <span class="bass-value" id="bassValue">0 dB</span>
    </div>

    <!-- Модальное окно профиля -->
    <div class="profile-modal" id="profileModal">
        <div class="profile-close" onclick="closeProfile()">✕</div>
        <div class="profile-header">
            <div class="profile-avatar">👤</div>
            <div class="profile-name">Мой профиль</div>
        </div>
        <div class="profile-stats">
            <div class="stat-card">
                <div class="stat-value" id="statToday">0</div>
                <div class="stat-label">Сегодня</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statWeek">0</div>
                <div class="stat-label">За неделю</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Всего</div>
            </div>
        </div>
        <div class="profile-favorites">
            <div class="favorites-title">❤️ Любимые треки</div>
            <div id="favoritesList">Нет любимых треков</div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeProfile()"></div>

    <!-- Плеер -->
    <div class="player-bar">
        <div class="player-track">
            <div class="player-image">🎵</div>
            <div class="player-info">
                <div class="player-name" id="currentTrackName">Выберите трек</div>
                <div class="player-artist" id="currentTrackArtist">Из папки music</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="control-buttons">
                <button class="control-btn" onclick="prevTrack()">⏮</button>
                <button class="control-btn" onclick="toggleShuffle()" id="shuffleBtn">🔀</button>
                <button class="control-btn play-pause" id="playPauseBtn" onclick="togglePlayPause()">▶</button>
                <button class="control-btn" onclick="toggleRepeat()" id="repeatBtn">🔁</button>
                <button class="control-btn" onclick="nextTrack()">⏭</button>
                <button class="bass-btn" id="bassBtn" onclick="toggleBassPanel()">🔊</button>
                <div class="speed-btn" onclick="changeSpeed()" id="speedBtn">1x</div>
            </div>
            
            <div class="progress-container">
                <span class="progress-time" id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBarContainer" onclick="seekTo(event)">
                    <div class="progress" id="progressBar"></div>
                </div>
                <span class="progress-time" id="duration">0:00</span>
            </div>
        </div>

        <div class="player-volume">
            <span class="volume-icon" id="volumeIcon" onclick="toggleMute()">🔊</span>
            <div class="volume-bar" id="volumeBarContainer" onclick="setVolume(event)">
                <div class="volume-progress" id="volumeBar" style="width: 70%"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" crossorigin="anonymous"></audio>

    <script>
        // Данные
        let currentTracks = [];
        let currentTrackIndex = -1;
        let isPlaying = false;
        let isMuted = false;
        let previousVolume = 70;
        let currentVolume = 70;
        let repeatMode = 'none';
        let shuffleMode = false;
        let shuffledTracks = [];
        let queue = [];
        let currentSpeed = 1;
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        
        // Статистика
        let stats = JSON.parse(localStorage.getItem('stats')) || { 
            today: 0, 
            week: 0, 
            total: 0, 
            date: new Date().toDateString(),
            lastWeek: new Date().toDateString()
        };

        // Для подсчета времени
        let listenStartTime = null;
        let listenInterval = null;

        // Элементы
        const audio = document.getElementById('audioPlayer');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const currentTrackName = document.getElementById('currentTrackName');
        const currentTrackArtist = document.getElementById('currentTrackArtist');
        const progressBar = document.getElementById('progressBar');
        const progressBarContainer = document.getElementById('progressBarContainer');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        const volumeBar = document.getElementById('volumeBar');
        const volumeBarContainer = document.getElementById('volumeBarContainer');
        const volumeIcon = document.getElementById('volumeIcon');
        const repeatBtn = document.getElementById('repeatBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const speedBtn = document.getElementById('speedBtn');
        const notification = document.getElementById('notification');
        const notificationTitle = document.getElementById('notificationTitle');
        const notificationMessage = document.getElementById('notificationMessage');
        const bassBtn = document.getElementById('bassBtn');
        const bassPanel = document.getElementById('bassPanel');
        const bassSlider = document.getElementById('bassSlider');
        const bassValue = document.getElementById('bassValue');
        const content = document.getElementById('content');

        // Прокси для обхода CORS (чтобы звук работал!)
        const CORS_PROXY = 'https://cors-anywhere.herokuapp.com/';

        // Загрузка
        window.addEventListener('DOMContentLoaded', () => {
            loadMusic();
            checkStats();
            updateStatsDisplay();
        });

        // События аудио
        audio.addEventListener('timeupdate', updateProgress);
        audio.addEventListener('loadedmetadata', updateDuration);
        audio.addEventListener('ended', nextTrack);
        audio.addEventListener('error', (e) => {
            console.error('Ошибка аудио:', e);
            showNotification('Ошибка', 'Не удалось воспроизвести трек');
        });
        
        audio.addEventListener('play', () => {
            isPlaying = true;
            playPauseBtn.innerHTML = '⏸';
            startListenTimer();
        });
        
        audio.addEventListener('pause', () => {
            isPlaying = false;
            playPauseBtn.innerHTML = '▶';
            stopListenTimer();
        });

        // Таймер прослушивания
        function startListenTimer() {
            listenStartTime = Date.now();
            if (listenInterval) clearInterval(listenInterval);
            listenInterval = setInterval(() => {
                if (isPlaying && listenStartTime) {
                    const minutes = Math.floor((Date.now() - listenStartTime) / 60000);
                    if (minutes > 0) {
                        updateStats(minutes);
                        listenStartTime = Date.now();
                    }
                }
            }, 60000);
        }

        function stopListenTimer() {
            if (listenInterval) {
                clearInterval(listenInterval);
                listenInterval = null;
            }
            listenStartTime = null;
        }

        // Навигация
        function showPage(page, element) {
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
            });
            
            if (element) {
                element.classList.add('active');
            }

            if (page === 'home') {
                showHomePage();
            } else if (page === 'favorites') {
                showFavoritesPage();
            } else if (page === 'all') {
                showAllTracksPage();
            } else if (page === 'playlists') {
                showPlaylistsPage();
            }
        }

        function showHomePage() {
            if (currentTracks.length === 0) {
                content.innerHTML = '<div style="text-align: center; padding: 50px;">Загрузка музыки...</div>';
                return;
            }

            let html = `
                <div class="welcome">
                    <h1>Добрый вечер</h1>
                    <p>Ваши треки из папки music</p>
                </div>

                <div class="grid">
                    <div class="card" onclick="showPage('all', document.querySelector('[onclick*=\\'all\\']'))">
                        <div class="card-image">🎵</div>
                        <div class="card-title">Все треки</div>
                        <div class="card-artist">${currentTracks.length} треков</div>
                    </div>
                    <div class="card" onclick="showPage('favorites', document.querySelector('[onclick*=\\'favorites\\']'))">
                        <div class="card-image">❤️</div>
                        <div class="card-title">Любимое</div>
                        <div class="card-artist">${favorites.length} треков</div>
                    </div>
                    <div class="card">
                        <div class="card-image">📁</div>
                        <div class="card-title">Плейлист дня</div>
                        <div class="card-artist">Подборка</div>
                    </div>
                    <div class="card">
                        <div class="card-image">⭐</div>
                        <div class="card-title">Рекомендации</div>
                        <div class="card-artist">Для вас</div>
                    </div>
                </div>

                <div class="section-title">
                    <span>Недавно добавленные</span>
                    <button onclick="loadMusic()">🔄 Обновить</button>
                </div>

                <div class="track-list">
                    <div class="track-header">
                        <div class="track-number">#</div>
                        <div class="track-title">НАЗВАНИЕ</div>
                        <div class="track-album">АЛЬБОМ</div>
                        <div class="track-duration"></div>
                    </div>
            `;

            currentTracks.slice(0, 5).forEach((track, index) => {
                const songName = track.name.replace(/\.[^/.]+$/, "");
                const isFavorite = favorites.includes(track.download_url);
                const isPlaying = currentTrackIndex === index;
                
                html += `
                    <div class="track-item ${isPlaying ? 'playing' : ''}" onclick="playTrack(${index})">
                        <div class="track-number">${index + 1}</div>
                        <div class="track-info">
                            <div class="track-image">🎵</div>
                            <div>
                                <div class="track-name">${songName}</div>
                                <div class="track-artist">Из папки music</div>
                            </div>
                        </div>
                        <div class="track-album">Локальная</div>
                        <div class="track-duration">${(track.size / 1024 / 1024).toFixed(2)} MB</div>
                        <div class="track-favorite ${isFavorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${track.download_url}')">
                            ${isFavorite ? '❤️' : '🤍'}
                        </div>
                        <div class="track-queue" onclick="event.stopPropagation(); addToQueue(${index})">
                            ➕
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            content.innerHTML = html;
        }

        function showFavoritesPage() {
            if (currentTracks.length === 0) {
                content.innerHTML = '<div style="text-align: center; padding: 50px;">Загрузка музыки...</div>';
                return;
            }

            const favoriteTracks = currentTracks.filter(t => favorites.includes(t.download_url));
            
            let html = `
                <div class="welcome">
                    <h1>❤️ Любимые треки</h1>
                    <p>${favoriteTracks.length} треков в избранном</p>
                </div>

                <div class="track-list">
                    <div class="track-header">
                        <div class="track-number">#</div>
                        <div class="track-title">НАЗВАНИЕ</div>
                        <div class="track-album">АЛЬБОМ</div>
                        <div class="track-duration"></div>
                    </div>
            `;

            if (favoriteTracks.length === 0) {
                html += '<div style="text-align: center; padding: 50px;">Нет любимых треков</div>';
            } else {
                favoriteTracks.forEach((track, index) => {
                    const songName = track.name.replace(/\.[^/.]+$/, "");
                    const originalIndex = currentTracks.findIndex(t => t.download_url === track.download_url);
                    
                    html += `
                        <div class="track-item ${currentTrackIndex === originalIndex ? 'playing' : ''}" onclick="playTrack(${originalIndex})">
                            <div class="track-number">${index + 1}</div>
                            <div class="track-info">
                                <div class="track-image">🎵</div>
                                <div>
                                    <div class="track-name">${songName}</div>
                                    <div class="track-artist">Из папки music</div>
                                </div>
                            </div>
                            <div class="track-album">Локальная</div>
                            <div class="track-duration">${(track.size / 1024 / 1024).toFixed(2)} MB</div>
                            <div class="track-favorite active" onclick="event.stopPropagation(); toggleFavorite('${track.download_url}')">
                                ❤️
                            </div>
                            <div class="track-queue" onclick="event.stopPropagation(); addToQueue(${originalIndex})">
                                ➕
                            </div>
                        </div>
                    `;
                });
            }

            html += '</div>';
            content.innerHTML = html;
        }

        function showAllTracksPage() {
            if (currentTracks.length === 0) {
                content.innerHTML = '<div style="text-align: center; padding: 50px;">Загрузка музыки...</div>';
                return;
            }

            let html = `
                <div class="welcome">
                    <h1>📁 Все треки</h1>
                    <p>${currentTracks.length} треков в библиотеке</p>
                </div>

                <div class="track-list">
                    <div class="track-header">
                        <div class="track-number">#</div>
                        <div class="track-title">НАЗВАНИЕ</div>
                        <div class="track-album">АЛЬБОМ</div>
                        <div class="track-duration"></div>
                    </div>
            `;

            currentTracks.forEach((track, index) => {
                const songName = track.name.replace(/\.[^/.]+$/, "");
                const isFavorite = favorites.includes(track.download_url);
                const isPlaying = currentTrackIndex === index;
                
                html += `
                    <div class="track-item ${isPlaying ? 'playing' : ''}" onclick="playTrack(${index})">
                        <div class="track-number">${index + 1}</div>
                        <div class="track-info">
                            <div class="track-image">🎵</div>
                            <div>
                                <div class="track-name">${songName}</div>
                                <div class="track-artist">Из папки music</div>
                            </div>
                        </div>
                        <div class="track-album">Локальная</div>
                        <div class="track-duration">${(track.size / 1024 / 1024).toFixed(2)} MB</div>
                        <div class="track-favorite ${isFavorite ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${track.download_url}')">
                            ${isFavorite ? '❤️' : '🤍'}
                        </div>
                        <div class="track-queue" onclick="event.stopPropagation(); addToQueue(${index})">
                            ➕
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            content.innerHTML = html;
        }

        function showPlaylistsPage() {
            content.innerHTML = `
                <div class="welcome">
                    <h1>📋 Плейлисты</h1>
                    <p>Скоро здесь появятся плейлисты</p>
                </div>
            `;
        }

        // Загрузка музыки
        async function loadMusic() {
            try {
                let response = await fetch('https://api.github.com/repos/YUSIKYT/Music/contents/music');
                
                if (!response.ok) {
                    response = await fetch('https://api.github.com/repos/YUSIKYT/Music/contents/Music');
                }
                
                if (!response.ok) {
                    throw new Error('Папка music не найдена');
                }

                const files = await response.json();
                
                currentTracks = files.filter(file => {
                    const ext = file.name.split('.').pop().toLowerCase();
                    return ['mp3', 'wav', 'ogg', 'm4a'].includes(ext);
                });

                if (currentTracks.length === 0) {
                    content.innerHTML = '<div style="text-align: center; padding: 50px;">Нет аудиофайлов</div>';
                    return;
                }

                showPage('home', document.querySelector('.nav-item'));

            } catch (error) {
                content.innerHTML = `
                    <div style="text-align: center; padding: 50px;">
                        <p>❌ Ошибка: ${error.message}</p>
                        <button onclick="loadMusic()" style="margin-top: 20px; padding: 10px 20px; background: #FC0; border: none; border-radius: 20px; cursor: pointer;">Повторить</button>
                    </div>
                `;
            }
        }

        // Воспроизведение (ИСПРАВЛЕНО для звука!)
        function playTrack(index) {
            if (index < 0 || index >= currentTracks.length) return;
            
            currentTrackIndex = index;
            const track = currentTracks[index];
            const songName = track.name.replace(/\.[^/.]+$/, "");
            
            currentTrackName.textContent = songName;
            currentTrackArtist.textContent = 'Из папки music';
            
            // Пробуем разные способы загрузки аудио
            const audioUrl = track.download_url;
            
            // Способ 1: Прямая загрузка с GitHub (raw)
            const rawUrl = audioUrl.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
            
            // Способ 2: Через прокси (если не работает)
            const proxyUrl = CORS_PROXY + rawUrl;
            
            console.log('Пробуем загрузить:', rawUrl);
            
            // Пробуем прямой URL
            audio.src = rawUrl;
            audio.load();
            
            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log('Прямая загрузка не сработала, пробуем через прокси:', error);
                    // Если не сработало, пробуем через прокси
                    audio.src = proxyUrl;
                    audio.load();
                    audio.play().catch(e => {
                        console.error('И прокси не сработал:', e);
                        showNotification('Ошибка', 'Не удалось воспроизвести трек');
                    });
                });
            }
            
            audio.playbackRate = currentSpeed;
            
            // Обновляем отображение
            const activeNav = document.querySelector('.nav-item.active');
            if (activeNav) {
                if (activeNav.textContent.includes('Главная')) {
                    showHomePage();
                } else if (activeNav.textContent.includes('Любимое')) {
                    showFavoritesPage();
                } else if (activeNav.textContent.includes('Все треки')) {
                    showAllTracksPage();
                }
            }
            
            showNotification('Сейчас играет', songName);
        }

        function togglePlayPause() {
            if (!audio.src) {
                if (currentTracks.length > 0) playTrack(0);
                return;
            }
            
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play().catch(e => console.log('Ошибка воспроизведения:', e));
            }
        }

        function nextTrack() {
            if (currentTracks.length === 0) return;
            
            if (queue.length > 0) {
                const nextIndex = queue.shift();
                updateQueueDisplay();
                playTrack(nextIndex);
                return;
            }
            
            if (repeatMode === 'one') {
                audio.currentTime = 0;
                audio.play().catch(e => console.log('Ошибка воспроизведения:', e));
                return;
            }
            
            let nextIndex;
            if (shuffleMode) {
                if (shuffledTracks.length === 0) {
                    shuffledTracks = [...Array(currentTracks.length).keys()];
                    shuffledTracks.sort(() => Math.random() - 0.5);
                }
                const currentPos = shuffledTracks.indexOf(currentTrackIndex);
                nextIndex = shuffledTracks[(currentPos + 1) % shuffledTracks.length];
            } else {
                nextIndex = (currentTrackIndex + 1) % currentTracks.length;
            }
            
            if (repeatMode === 'all' || nextIndex !== 0) {
                playTrack(nextIndex);
            } else {
                audio.pause();
            }
        }

        function prevTrack() {
            if (currentTracks.length === 0) return;
            
            if (audio.currentTime > 3) {
                audio.currentTime = 0;
                return;
            }
            
            let prevIndex;
            if (shuffleMode) {
                const currentPos = shuffledTracks.indexOf(currentTrackIndex);
                prevIndex = shuffledTracks[(currentPos - 1 + shuffledTracks.length) % shuffledTracks.length];
            } else {
                prevIndex = (currentTrackIndex - 1 + currentTracks.length) % currentTracks.length;
            }
            
            playTrack(prevIndex);
        }

        function toggleRepeat() {
            const modes = ['none', 'all', 'one'];
            const currentIndex = modes.indexOf(repeatMode);
            repeatMode = modes[(currentIndex + 1) % modes.length];
            
            repeatBtn.style.color = repeatMode !== 'none' ? '#FC0' : '';
            repeatBtn.textContent = repeatMode === 'one' ? '🔂' : '🔁';
            
            showNotification('Повтор', 
                repeatMode === 'none' ? 'Выключен' :
                repeatMode === 'all' ? 'Все треки' : 'Один трек');
        }

        function toggleShuffle() {
            shuffleMode = !shuffleMode;
            shuffleBtn.style.color = shuffleMode ? '#FC0' : '';
            if (shuffleMode) {
                shuffledTracks = [...Array(currentTracks.length).keys()];
                shuffledTracks.sort(() => Math.random() - 0.5);
            }
            showNotification('Случайный порядок', shuffleMode ? 'Включен' : 'Выключен');
        }

        function changeSpeed() {
            const speeds = [1, 1.5, 2, 0.5];
            const currentIndex = speeds.indexOf(currentSpeed);
            currentSpeed = speeds[(currentIndex + 1) % speeds.length];
            audio.playbackRate = currentSpeed;
            speedBtn.textContent = currentSpeed + 'x';
            showNotification('Скорость', currentSpeed + 'x');
        }

        // Очередь
        function addToQueue(index) {
            if (!queue.includes(index)) {
                queue.push(index);
                updateQueueDisplay();
                showNotification('Добавлено в очередь', currentTracks[index].name.replace(/\.[^/.]+$/, ""));
            }
        }

        function removeFromQueue(index) {
            queue.splice(index, 1);
            updateQueueDisplay();
        }

        function updateQueueDisplay() {
            const queueItems = document.getElementById('queueItems');
            
            if (queue.length === 0) {
                queueItems.innerHTML = '<div style="text-align: center; color: #B3B3B3;">Очередь пуста</div>';
                return;
            }

            let html = '';
            queue.forEach((trackIndex, i) => {
                const track = currentTracks[trackIndex];
                const songName = track.name.replace(/\.[^/.]+$/, "");
                html += `
                    <div class="queue-item ${currentTrackIndex === trackIndex ? 'playing' : ''}">
                        <span>${i + 1}</span>
                        <div class="queue-item-info">
                            <div class="queue-item-name">${songName}</div>
                        </div>
                        <div class="queue-remove" onclick="removeFromQueue(${i})">✕</div>
                    </div>
                `;
            });
            queueItems.innerHTML = html;
        }

        function toggleQueue() {
            document.getElementById('queuePanel').classList.toggle('open');
            updateQueueDisplay();
        }

        // Любимое
        function toggleFavorite(url) {
            const index = favorites.indexOf(url);
            if (index === -1) {
                favorites.push(url);
                showNotification('❤️', 'Добавлено в любимое');
            } else {
                favorites.splice(index, 1);
                showNotification('💔', 'Удалено из любимого');
            }
            localStorage.setItem('favorites', JSON.stringify(favorites));
            
            const activeNav = document.querySelector('.nav-item.active');
            if (activeNav) {
                if (activeNav.textContent.includes('Главная')) {
                    showHomePage();
                } else if (activeNav.textContent.includes('Любимое')) {
                    showFavoritesPage();
                } else if (activeNav.textContent.includes('Все треки')) {
                    showAllTracksPage();
                }
            }
            
            updateFavoritesList();
        }

        // Статистика
        function checkStats() {
            const today = new Date().toDateString();
            if (stats.date !== today) {
                stats.week += stats.today;
                stats.today = 0;
                stats.date = today;
                localStorage.setItem('stats', JSON.stringify(stats));
            }

            const weekAgo = new Date();
            weekAgo.setDate(weekAgo.getDate() - 7);
            if (new Date(stats.lastWeek) < weekAgo) {
                stats.week = 0;
                stats.lastWeek = today;
            }
        }

        function updateStats(minutes) {
            stats.today += minutes;
            stats.week += minutes;
            stats.total += minutes;
            localStorage.setItem('stats', JSON.stringify(stats));
            updateStatsDisplay();
        }

        function updateStatsDisplay() {
            document.getElementById('todayStats').textContent = Math.round(stats.today);
            document.getElementById('totalStats').textContent = Math.round(stats.total);
            document.getElementById('statToday').textContent = Math.round(stats.today);
            document.getElementById('statWeek').textContent = Math.round(stats.week);
            document.getElementById('statTotal').textContent = Math.round(stats.total);
        }

        // Профиль
        function openProfile() {
            updateFavoritesList();
            document.getElementById('profileModal').classList.add('open');
            document.getElementById('overlay').classList.add('open');
        }

        function closeProfile() {
            document.getElementById('profileModal').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        function updateFavoritesList() {
            const favoritesList = document.getElementById('favoritesList');
            const favoriteTracks = currentTracks.filter(t => favorites.includes(t.download_url));
            
            if (favoriteTracks.length === 0) {
                favoritesList.innerHTML = '<div style="text-align: center; color: #B3B3B3;">Нет любимых треков</div>';
                return;
            }

            let html = '';
            favoriteTracks.slice(0, 10).forEach(track => {
                const songName = track.name.replace(/\.[^/.]+$/, "");
                html += `
                    <div class="favorite-item">
                        <span class="favorite-icon">❤️</span>
                        <span class="favorite-name">${songName}</span>
                    </div>
                `;
            });

            if (favoriteTracks.length > 10) {
                html += `<div style="text-align: center; color: #B3B3B3; margin-top: 10px;">И еще ${favoriteTracks.length - 10} треков...</div>`;
            }

            favoritesList.innerHTML = html;
        }

        // Уведомления
        function showNotification(title, message) {
            notificationTitle.textContent = title;
            notificationMessage.textContent = message;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 2000);
        }

        // Прогресс
        function updateProgress() {
            if (audio.duration) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressBar.style.width = percent + '%';
                currentTimeSpan.textContent = formatTime(audio.currentTime);
            }
        }

        function updateDuration() {
            durationSpan.textContent = formatTime(audio.duration);
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        function seekTo(event) {
            const rect = progressBarContainer.getBoundingClientRect();
            const pos = (event.clientX - rect.left) / rect.width;
            audio.currentTime = pos * audio.duration;
        }

        function setVolume(event) {
            const rect = volumeBarContainer.getBoundingClientRect();
            const pos = (event.clientX - rect.left) / rect.width;
            const volume = Math.max(0, Math.min(1, pos));
            audio.volume = volume;
            currentVolume = volume * 100;
            volumeBar.style.width = currentVolume + '%';
        }

        function toggleMute() {
            if (isMuted) {
                audio.volume = previousVolume / 100;
                currentVolume = previousVolume;
                volumeIcon.textContent = '🔊';
            } else {
                previousVolume = currentVolume;
                audio.volume = 0;
                currentVolume = 0;
                volumeIcon.textContent = '🔇';
            }
            isMuted = !isMuted;
            volumeBar.style.width = currentVolume + '%';
        }
    </script>
</body>
</html>
