<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя музыка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4a00e0 0%, #8e2de2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .music-list {
            padding: 30px;
        }

        .song-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .song-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .song-number {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }

        .song-name {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            word-break: break-word;
        }

        audio {
            width: 100%;
            border-radius: 30px;
        }

        .no-music {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .no-music .emoji {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .no-music h3 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #333;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            border-top: 1px solid #eee;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            margin: 20px 0;
            transition: transform 0.3s;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Моя музыка</h1>
            <p>Все треки из папки music</p>
        </div>

        <div class="music-list" id="musicList">
            <div class="no-music">
                <div class="emoji">⏳</div>
                <h3>Загрузка музыки...</h3>
            </div>
        </div>

        <div class="footer">
            <p>📁 Добавьте файлы в папку <strong>music</strong> на GitHub</p>
            <p>Сайт обновляется автоматически</p>
        </div>
    </div>

    <script>
        async function loadMusic() {
            const musicList = document.getElementById('musicList');
            
            try {
                // ИСПРАВЛЕНО: репозиторий называется "Music" (с большой буквы)
                // и владелец YUSIKYT
                const response = await fetch('https://api.github.com/repos/YUSIKYT/Music/contents/music');
                
                if (!response.ok) {
                    if (response.status === 404) {
                        // Пробуем другой вариант - может папка называется Music (с большой буквы)?
                        const response2 = await fetch('https://api.github.com/repos/YUSIKYT/Music/contents/Music');
                        
                        if (!response2.ok) {
                            throw new Error('Папка music не найдена. Создайте папку "music" в корне репозитория Music');
                        }
                        
                        // Если нашли папку Music с большой буквы
                        const files = await response2.json();
                        displaySongs(files);
                        return;
                    } else {
                        throw new Error(`Ошибка GitHub API: ${response.status}`);
                    }
                }

                const files = await response.json();
                displaySongs(files);

            } catch (error) {
                console.error('Ошибка:', error);
                
                musicList.innerHTML = `
                    <div class="no-music">
                        <div class="emoji">❌</div>
                        <h3>Ошибка загрузки музыки</h3>
                        <p style="color: #ff4444; margin-bottom: 20px;">${error.message}</p>
                        
                        <div style="background: #f0f0f0; border-radius: 12px; padding: 20px; text-align: left; margin: 20px 0;">
                            <p style="font-weight: bold; margin-bottom: 10px;">📋 Проверьте:</p>
                            <ul style="list-style: none;">
                                <li style="margin-bottom: 8px;">✓ Репозиторий: <strong>YUSIKYT/Music</strong></li>
                                <li style="margin-bottom: 8px;">✓ Папка должна называться <strong>music</strong> или <strong>Music</strong></li>
                                <li style="margin-bottom: 8px;">✓ В папке должны быть аудиофайлы (.mp3, .wav, .ogg)</li>
                                <li style="margin-bottom: 8px;">✓ После загрузки подождите 1-2 минуты</li>
                            </ul>
                        </div>
                        
                        <button class="refresh-btn" onclick="loadMusic()">
                            🔄 Попробовать снова
                        </button>
                    </div>
                `;
            }
        }

        function displaySongs(files) {
            const musicList = document.getElementById('musicList');
            
            if (!Array.isArray(files) || files.length === 0) {
                musicList.innerHTML = `
                    <div class="no-music">
                        <div class="emoji">📁</div>
                        <h3>Папка music пуста</h3>
                        <p>Добавьте аудиофайлы в папку music на GitHub</p>
                        <button class="refresh-btn" onclick="loadMusic()">🔄 Обновить</button>
                    </div>
                `;
                return;
            }

            // Фильтруем только аудиофайлы
            const audioFiles = files.filter(file => {
                if (file.type !== 'file') return false;
                const ext = file.name.split('.').pop().toLowerCase();
                return ['mp3', 'wav', 'ogg', 'm4a', 'aac', 'flac', 'webm'].includes(ext);
            });

            if (audioFiles.length === 0) {
                musicList.innerHTML = `
                    <div class="no-music">
                        <div class="emoji">🎵</div>
                        <h3>Нет аудиофайлов</h3>
                        <p>В папке music найдены файлы, но нет поддерживаемых аудиоформатов</p>
                        <p>Поддерживаемые форматы: MP3, WAV, OGG, M4A, AAC, FLAC</p>
                        <button class="refresh-btn" onclick="loadMusic()">🔄 Обновить</button>
                    </div>
                `;
                return;
            }

            // Создаем список песен
            let songsHTML = '';
            
            audioFiles.forEach((file, index) => {
                // Получаем имя файла без расширения
                const songName = file.name.replace(/\.[^/.]+$/, "");
                
                // Форматируем размер
                const sizeInMB = (file.size / 1024 / 1024).toFixed(2);
                
                songsHTML += `
                    <div class="song-item">
                        <div class="song-info">
                            <span class="song-number">${index + 1}</span>
                            <span class="song-name">${songName}</span>
                        </div>
                        <audio controls preload="metadata">
                            <source src="${file.download_url}" type="audio/mpeg">
                            Ваш браузер не поддерживает аудио элемент.
                        </audio>
                        <div style="font-size: 0.8em; color: #999; margin-top: 5px; text-align: right;">
                            ${sizeInMB} MB
                        </div>
                    </div>
                `;
            });

            musicList.innerHTML = songsHTML;
        }

        // Загружаем музыку при загрузке страницы
        window.addEventListener('DOMContentLoaded', loadMusic);
    </script>
</body>
</html>
